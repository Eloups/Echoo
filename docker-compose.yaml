services:
  api-nginx:
    image: nginx:alpine
    ports:
      - "8000:8000"
    volumes:
      - ./docker/api-nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./apps/api:/var/www/api
      - ./apps/api/.env.docker:/var/www/api/.env
    depends_on:
      php:
        condition: service_started
    networks:
      - net1
  php:
    build:
      context: .
      dockerfile: ./docker/php-fpm/Dockerfile
    volumes:
    - ./apps/api:/var/www/api
    - ./apps/api/.env.docker:/var/www/api/.env
    networks:
      - net1
  database:
    build:
      context: .
      dockerfile: ./docker/postgresql/Dockerfile
    restart: always
    shm_size: 128mb
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgresql/dataset:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: echoo
    networks:
      - net1
  file-server:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./docker/file-server/files/images:/usr/share/nginx/html/images
      - ./docker/file-server/files/musics:/usr/share/nginx/html/musics
      - ./docker/file-server/conf/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - net1  
  
  database_auth:
    image: postgres:18-alpine
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"

  auth-service:
    image: php:8.3-apache
    volumes: 
     - ./apps/auth-service-JWT/apps/api:/var/www/html
    environment:
      AUTH_SERVICE_URL: http://host.docker.internal:3333
    extra_hosts:
      # Allow accessing localhost from inside a docker container through host.docker.internal
      - "host.docker.internal:host-gateway"
    ports: 
      - 8000:80
    networks: 
      - net1
      
networks:
  net1:
    driver: bridge  



name: Auth service lint test CI

on:
    push:
      branches: [ "main", "develop" ]
    pull_request:
      branches: [ "main", "develop" ]
  
jobs:
    lint:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [22.x]
        
        steps:
          - uses: actions/checkout@v4
          - name: Use Node.js ${{ matrix.node-version }}
            uses: actions/setup-node@v4
            with:
              node-version: ${{ matrix.node-version }}
              cache: 'npm'
              cache-dependency-path: 'apps/auth-service-JWT/package-lock.json'
          
          - name: install dependencies
            run: cd apps/auth-service-JWT && npm install      

          - name: lint test
            run: cd apps/auth-service-JWT && npm run lint